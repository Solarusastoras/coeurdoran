<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="#8F9648" />

  <!-- Sunbeams (radiating from Y=210, X=200 - the center dot of 'C') -->
  <!-- Sunbeams converge at X=200, Y=210 and radiate outwards to the inner arch -->
  <g stroke="#212015" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <!-- Top-left beams -->
    <line x1="200" y1="210" x2="154" y2="180" />
    <line x1="200" y1="210" x2="165" y2="140" />
    <line x1="200" y1="210" x2="205" y2="114" />
    
    <!-- Top-right beams -->
    <line x1="200" y1="210" x2="256" y2="108" />
    <line x1="200" y1="210" x2="305" y2="122" />
    <line x1="200" y1="210" x2="340" y2="160" />
    
    <!-- Middle-right beams (stopping before/behind moon) -->
    <line x1="200" y1="210" x2="358" y2="210" />
    <line x1="200" y1="210" x2="358" y2="270" />
    
    <!-- Bottom-right beams -->
    <line x1="200" y1="210" x2="345" y2="325" />
    <line x1="200" y1="210" x2="305" y2="352" />
    <line x1="200" y1="210" x2="256" y2="352" />
    <line x1="200" y1="210" x2="205" y2="352" />
  </g>

  <!-- Crescent Moon (Hugging the right side of the inner arch) -->
  <!-- Outer curve uses inner arch radius (102px, centered at 256, 180). Inner curve is smaller. -->
  <path d="M 320 112 
           A 102 102 0 0 1 358 180 
           A 102 102 0 0 1 320 248 
           A 85 85 0 0 0 320 112 Z" 
        fill="#212015" />

  <!-- Outer Arch (width 220px: X=146 to X=366, Y=180 to Y=360, radius 110px) -->
  <path d="M 146 360 L 146 180 A 110 110 0 0 1 366 180 L 366 360 Z" 
        fill="none" stroke="#212015" stroke-width="4.5" stroke-linejoin="round" />

  <!-- Inner Arch (width 204px: X=154 to X=358, Y=180 to Y=352, radius 102px) -->
  <path d="M 154 352 L 154 180 A 102 102 0 0 1 358 180 L 358 352 Z" 
        fill="none" stroke="#212015" stroke-width="3" stroke-linejoin="round" />

  <!-- Letter 'C' (centered at X=168, Y=210) -->
  <text font-family="'Playfair Display', Georgia, serif" 
        font-size="95" 
        font-weight="bold" 
        fill="#212015" 
        text-anchor="middle" 
        x="166" 
        y="242">C</text>

  <!-- Diamond Dot in the center of 'C' (X=200, Y=210) -->
  <polygon points="200,204 206,210 200,216 194,210" fill="#212015" />

  <!-- Brand Text: COEUR D'ORAN (centered at X=256, Y=445) -->
  <g font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-weight="800">
    <!-- COEUR D’ -->
    <text font-size="28" letter-spacing="3" fill="#212015" text-anchor="end" x="236" y="445">COEUR D’</text>
    
    <!-- Shrunked & Elevated 'o' -->
    <text font-size="20" fill="#212015" text-anchor="middle" x="252" y="435">o</text>
    
    <!-- Underline line under 'o' -->
    <line x1="243" y1="443" x2="261" y2="443" stroke="#212015" stroke-width="2.5" />
    
    <!-- Diamond Dot under the line -->
    <polygon points="252,447 255,450 252,453 249,450" fill="#212015" />
    
    <!-- RAN -->
    <text font-size="28" letter-spacing="3" fill="#212015" text-anchor="start" x="266" y="445">RAN</text>
  </g>
</svg>
